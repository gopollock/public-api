syntax = "proto3";

package classtime.service.account;

import "common_messages.proto";
import "common_role.proto";
import "entity_store_messages.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "AccountEntitiesProto";
option java_package = "classtime.service.account";

enum AuthenticationProvider {
  PASSWORD = 0;
  GOOGLE = 1;
  FACEBOOK = 2;
  MICROSOFT = 3;
  CLEVER = 4;
  SANIS = 5; // IDM Niedersachsen
  TEAMS = 6;
  NONE = 7; // Used only in case of not authorized user at all
  BASELLAND = 8;
  ADMIN_TOOL = 9;
  NICKNAME = 10; // Temporary authorized user without an email verification
  EMAIL_VERIFICATION = 11;
  I_SERV = 12;
  WEB_UNTIS = 13;
  EDULOG = 14;
  EXTERNAL = 15;
  EXAM_CENTER = 16;
  FOBIZZ = 17;
  CLASSLINK = 18;
  PUBLISHER = 19;
}

message UserProfile {
  bool is_new = 1;
  string first_name = 3;
  string last_name = 4;
  string picture = 5;
}

message AuthenticationMethod {
  int32 id = 5;
  AuthenticationProvider provider = 1;
  string email = 2;

  // Unique identifier for the user in the given provider.
  string subject = 4;

  oneof secrets {
    bytes password_hash_hash = 3;
    // Additional fields required in case of SAML authentication, TBD
  }

  int32 failed_login_attempts = 6;
  google.protobuf.Timestamp last_success_login_at = 7;
}

message AccountMerge {
  google.protobuf.Timestamp merged_at = 1;
  classtime.entity.EntityRef merged_account_ref = 2;
  classtime.entity.EntityRef main_account_ref = 3;
}

message AdminPermissions {
  repeated DataRealm data_realms = 1;
  bool has_full_access = 2;
}

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
}

// Represents Clever format
enum Race {
  RACE_UNSPECIFIED = 0;
  RACE_AMERICAN_INDIAN = 1;
  RACE_ASIAN = 2;
  RACE_BLACK_OR_AFRICAN_AMERICAN = 3;
  RACE_CAUCASIAN = 4;
  RACE_TWO_OR_MORE_RACES = 5;
  RACE_HAWAIIAN_OR_PACIFIC_ISLANDER = 6;
}

message ClasslinkDemographicDetails {
  bool is_american_indian_or_alaska_native = 1;
  bool is_asian = 2;
  bool is_black_or_african_american = 3;
  bool is_native_hawaiian_or_other_pacific_islander = 4;
  bool is_white = 5;
  bool is_two_or_more_races = 6;
  bool is_hispanic_or_latino = 7;
}

message CleverDemographicDetails {
  Race race = 1;
  bool hispanic_ethnicity = 2;
}

message StudentMetadata {
  string grade = 1;
  bool is_english_learner = 2;
  bool has_special_education_status = 3;
  Gender gender = 4;
  oneof demographics {
    ClasslinkDemographicDetails classlink_details = 5;
    CleverDemographicDetails clever_details = 6;
  }
}

message AccountMetadata {
  oneof kind {
    StudentMetadata student = 1;
  }
}

message Account {
  reserved 5, 6, 8, 10;
  UserProfile user_profile = 1;
  int32 primary_authentication_method_id = 2;
  repeated AuthenticationMethod authentication_methods = 4;
  google.protobuf.Timestamp blocked_at = 7;
  repeated classtime.service.common.Role roles = 9;
  repeated AccountMerge merge_history = 11;
  string country_code = 12;
  AdminPermissions admin_permissions = 13;
  AccountMetadata metadata = 14;
}

message AccountExtensionState {
  reserved 1;
  string account_extension_id = 2;
  bytes account_extension_secret_hash = 3;
}

message AccountExtensionInfo {
  reserved 1, 5, 6;
  message User {
    string first_name = 1;
    string last_name = 2;
    string email = 3;
    string picture = 4;
  }

  string extended_account_id = 7;
  bool is_merge = 2;
  User primary_user = 3;
  User secondary_user = 4;
  string merging_account_token = 8;
}

message AccountProfile {
  string name = 1;
  string first_name = 5;
  string last_name = 6;
  string email = 2;
  repeated classtime.service.common.Role roles = 3;
  string picture = 4;
  google.protobuf.Timestamp last_success_login_at = 7;
}

enum DataRealm {
  DATA_REALM_UNSPECIFIED = 0;
  DATA_REALM_EU = 1;
  DATA_REALM_US = 2;
}

enum OrganizationGroup {
  GROUP_UNSPECIFIED = 0;
  GROUP_NIEDERSACHSEN = 1;
  GROUP_BASELLAND = 2;
  GROUP_UKRAINE_SUPPORT_PROGRAMME_2022 = 3;
  GROUP_CANTON_ZURICH = 4;
  GROUP_COMPTON_UNIFIED_SCHOOL_DISTRICT = 5;
  GROUP_DESERT_SANDS_UNIFIED_SCHOOL_DISTRICT = 6;
  GROUP_PARAMOUNT_UNIFIED_SCHOOL_DISTRICT = 7;
  GROUP_ONTARIO_MONTCLAIR_SCHOOL_DISTRICT = 8;
  GROUP_PALM_SPRINGS_UNIFIED_SCHOOL_DISTRICT = 9;
  GROUP_BEVERLY_HILLS_UNIFIED_SCHOOL_DISTRICT = 10;
  GROUP_FONTANA_UNIFIED_SCHOOL_DISTRICT = 11;
  GROUP_ORANGE_UNIFIED_SCHOOL_DISTRICT = 12;
  GROUP_RIALTO_UNIFIED_SCHOOL_DISTRICT = 13;
  GROUP_PUC_TRIUMPH_CHARTER_ACADEMY = 14;
  GROUP_SOUTH_FORK_UNION_SCHOOL_DISTRICT = 15;
  GROUP_ALLEGIANCE_STEAM_ACADEMY_THRIVE = 16;
  GROUP_ALLEGIANCE_STEAM_ACADEMY_CHINO = 17;
  GROUP_ALVIEW_DAIRYLAND_UNION_ELEMENTARY_SCHOOL_DISTRICT = 18;
  GROUP_CENTURY_COMMUNITY_CHARTER_SCHOOL = 19;
  GROUP_TUSTIN_UNIFIED_SCHOOL_DISTRICT = 20;
  GROUP_RIVERSIDE_UNIFIED_SCHOOL_DISTRICT = 21;
  GROUP_SAN_BENITO_HIGH_SCHOOL_DISTRICT = 22;
  GROUP_PLACENTIA_YORBA_LINDA_UNIFIED_SCHOOL_DISTRICT = 23;
  GROUP_SANTA_BARBARA_UNIFIED_SCHOOL_DISTRICT = 24;
  GROUP_OCEANSIDE_UNIFIED_SCHOOL_DISTRICT = 25;
  GROUP_BANNING_UNIFIED_SCHOOL_DISTRICT = 26;
  GROUP_REDONDO_BEACH_UNIFIED_SCHOOL_DISTRICT = 27;
  GROUP_LOS_ANGELES_UNIFIED_SCHOOL_DISTRICT = 28;
}

enum OrganizationPlan {
  ORGANIZATION_PLAN_UNSPECIFIED = 0;
  ORGANIZATION_PLAN_15 = 1; // this is the minimum tear
  ORGANIZATION_PLAN_30 = 2;
  ORGANIZATION_PLAN_50 = 3;
  ORGANIZATION_PLAN_100 = 4;
  ORGANIZATION_PLAN_150 = 5;
  ORGANIZATION_PLAN_UNLIMITED = 6;
}

message Organization {
  string title = 1;
  DataRealm data_realm = 2;
  bool is_premium_enabled = 3;
  string library = 4;
  bool is_collaboration_disabled = 5;
  classtime.service.common.Theme theme = 6;
  string domain = 7;
  oneof roster_ref {
    string classlink_ref = 8;
    string clever_ref = 16;
  }
  bool are_ai_comments_allowed = 9;
  bool is_account_extension_disabled = 10;
  string custom_logo_url = 11;
  repeated classtime.entity.EntityRef admin_account_refs = 12;
  OrganizationGroup group = 13;
  string country_code = 14;
  bool is_free_text_auto_validation_disabled = 15;
  OrganizationPlan plan = 17;
  string django_school_ref = 18;
  repeated OrganizationMerge merge_history = 19;
  string client_id = 20;
}

message OrganizationMerge {
  google.protobuf.Timestamp merged_at = 1;
  classtime.entity.EntityRef main_organization_ref = 2;
  classtime.entity.EntityRef merged_organization_ref = 3;
}

message OrganizationMember {
  classtime.entity.EntityRef account_ref = 1;
  bool is_excluded_from_premium = 2;
  google.protobuf.Timestamp added_at = 3;
  bool is_admin = 4;
}
