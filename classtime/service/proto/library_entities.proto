syntax = "proto3";

package classtime.service.library.api;

import "common_messages.proto";
import "entity_store_messages.proto";
import "google/protobuf/timestamp.proto";
import "question_entities.proto";

option java_multiple_files = true;
option java_outer_classname = "LibraryEntitiesProto";
option java_package = "classtime.service.library.api";

message LibraryItemProvider {
  string title = 1;
  string description = 2;
}

message FolderInfo {
  string id = 1;
  string title = 2;
  string parent_id = 3;
  bool is_shared = 4;
  bool is_readonly = 5;
  bool is_archived = 6;
  string resource_pool_id = 7;
  google.protobuf.Timestamp modified_at = 9;
  string root_folder_id = 10;
  string icon_image = 11;
  google.protobuf.Timestamp expires_at = 12;
  LibraryItemProvider provider = 13;
  repeated common.BreadCrumb breadcrumbs = 14;
  common.QuestionBank derived_question_bank_details = 15;
  string synchronized_from_ref = 16;
}

enum QuestionSetPrivacy {
  QUESTION_SET_PRIVACY_UNSPECIFIED = 0;
  QUESTION_SET_PRIVACY_DEFAULT = 1;
  QUESTION_SET_PRIVACY_PROTECTED = 2;
  QUESTION_SET_PRIVACY_MODERATION = 3;
  QUESTION_SET_PRIVACY_APPROVED = 4;
  QUESTION_SET_PRIVACY_REJECTED = 5;
  QUESTION_SET_PRIVACY_PUBLIC = 6;
}

message QuestionInfo {
  string id = 1;
  string title = 2;
  classtime.service.question.api.QuestionKind kind = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp modified_at = 5;
  classtime.service.common.GradingPoint weight = 6;
  bool is_poll = 7;
  bool is_archived = 8;
  bool is_shared = 9;
  bool is_readonly = 10;
  bool is_onboarding = 13;
  bool is_solution_empty = 14;
  repeated classtime.service.common.QuestionTag tags = 11;
  classtime.service.question.api.ContextMaterial context_material = 12;
}

message QuestionSetInfo {
  string id = 1;
  string title = 2;
  int32 question_count = 3;
  classtime.service.common.GradingPoint max_points = 4;
  string parent_folder_id = 5;
  bool is_shared = 6;
  bool is_readonly = 7;
  bool is_archived = 8;
  string resource_pool_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp modified_at = 11;
  string root_folder_id = 12;
  bool is_onboarding = 13;
  QuestionSetPrivacy privacy = 14;
  repeated QuestionInfo questions = 15;
  classtime.entity.EntityRef entity_store_session_ref = 16;
  classtime.entity.EntityRef question_bank_ref = 17;
  classtime.entity.EntityRef anonymous_solo_session_ref = 18;
  classtime.entity.EntityRef authorized_solo_session_ref = 19;
  string solo_session_link = 20;
  string secret_link = 26;
  classtime.entity.EntityRef publisher_account_ref = 21;
  string extra = 22;
  string author = 23;
  repeated common.BreadCrumb breadcrumbs = 24;
  classtime.entity.EntityRef derived_from_ref = 25;
  // We need it because django returns only questionIds. Should be removed after switching to implementation
  bool has_questions_with_empty_solutions = 27 [deprecated = true];
}

message QuestionLock {
  string id = 1;
  classtime.entity.EntityRef owner_account_ref = 2;
}

enum EntityStatus {
  ALIVE = 0;
  ARCHIVED = 1;
  DELETED = 2;
}

message ResourcePool {
  oneof owner_ref {
    classtime.entity.EntityRef owner_account_ref = 1;
    classtime.entity.EntityRef organization_ref = 2;
  }
}

enum AccessPermission {
  ACCESS_PERMISSION_UNSPECIFIED = 0;
  ACCESS_PERMISSION_READ_ONLY = 1;
  ACCESS_PERMISSION_READ_WRITE = 2;
  ACCESS_PERMISSION_READ_WRITE_SHARED = 3;
}

message Access {
  classtime.entity.EntityRef account_ref = 1;
  AccessPermission permission = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message Folder {
  string permanent_id = 1;
  string title = 2;
  classtime.entity.EntityRef parent_folder_ref = 3;
  classtime.entity.EntityRef synchronized_from_ref = 4;
}

message QuestionSet {
  string permanent_id = 1;
  string title = 2;
  bool is_onboarding = 3;
  QuestionSetPrivacy privacy = 4;
  string secret_link = 5;

  message PublicInfo {
    string extra = 1;
    string author_name = 2;
    string description = 3;
  }
  PublicInfo public_info = 6;

  enum License {
    QUESTION_SET_LICENSE_UNSPECIFIED = 0;
    QUESTION_SET_LICENSE_ZNO = 1;
    QUESTION_SET_LICENSE_KHAN = 2;
  }
  License license = 7;

  classtime.entity.EntityRef parent_folder_ref = 8;
  classtime.entity.EntityRef derived_from_ref = 9;
  classtime.entity.EntityRef synchronized_from_ref = 10;
  classtime.entity.EntityRef anonymous_solo_session_ref = 11;
  classtime.entity.EntityRef authorized_solo_session_ref = 12;
  repeated classtime.entity.EntityRef ordered_questions = 13;
}
