syntax = "proto3";

package classtime.service.library.api;

import "common_messages.proto";
import "entity_store_messages.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "library_entities.proto";
import "question_entities.proto";

option java_multiple_files = true;
option java_outer_classname = "LibraryMessagesProto";
option java_package = "classtime.service.library.api";

message FolderInfo {
  string id = 1;
  string title = 2;
  string parent_id = 3;
  bool is_shared = 4;
  bool is_readonly = 5;
  bool is_archived = 6;
  string resource_pool_id = 7;
  google.protobuf.Timestamp modified_at = 9;
  string root_folder_id = 10;
  google.protobuf.Timestamp expires_at = 12;
  repeated common.BreadCrumb breadcrumbs = 14;

  // TODO(https://app.asana.com/1/29774015570538/project/1176787179185737/task/1216299425862178):
  // curriculum fields, to be removed after the switch to curriculum service endpoints
  string icon_image = 11;
  LibraryItemProvider provider = 13;
  common.QuestionBank derived_question_bank_details = 15;
  string synchronized_from_ref = 16;
}

message QuestionSetInfo {
  string id = 1;
  string title = 2;
  int32 question_count = 3;
  classtime.service.common.GradingPoint max_points = 4;
  string parent_folder_id = 5;
  bool is_shared = 6;
  bool is_readonly = 7;
  bool is_archived = 8;
  string resource_pool_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp modified_at = 11;
  string root_folder_id = 12;
  bool is_onboarding = 13;
  QuestionSetPrivacy privacy = 14;
  repeated QuestionInfo questions = 15;
  classtime.entity.EntityRef entity_store_session_ref = 16;
  string entity_store_session_id = 28;
  classtime.entity.EntityRef question_bank_ref = 17;
  string question_bank_id = 29;
  classtime.entity.EntityRef anonymous_solo_session_ref = 18;
  string anonymous_solo_session_id = 30;
  classtime.entity.EntityRef authorized_solo_session_ref = 19;
  string authorized_solo_session_id = 31;
  string solo_session_link = 20;
  string secret_link = 26;
  classtime.entity.EntityRef publisher_account_ref = 21;
  string publisher_account_id = 32;
  string extra = 22;
  string author = 23;
  repeated common.BreadCrumb breadcrumbs = 24;
  classtime.entity.EntityRef derived_from_ref = 25;
  string derived_from_id = 33;
  // We need it because django returns only questionIds. Should be removed after switching to implementation
  bool has_questions_with_empty_solutions = 27 [deprecated = true];
}

message QuestionInfo {
  string id = 1;
  string title = 2;
  classtime.service.question.api.QuestionKind kind = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp modified_at = 5;
  classtime.service.common.GradingPoint weight = 6;
  bool is_poll = 7;
  bool is_archived = 8;
  bool is_shared = 9;
  bool is_readonly = 10;
  bool is_onboarding = 13;
  bool is_solution_empty = 14;
  repeated classtime.service.common.QuestionTag tags = 11;
  classtime.service.question.api.ContextMaterial context_material = 12;
}

message CreateFolderRequest {
  option (classtime.service.common.public_api) = true;
  reserved 1;
  string parent_folder_id = 2;
  string title = 3;
}

message CreateFolderResponse {
  option (classtime.service.common.public_api) = true;
  FolderInfo folder_info = 1;
}

message UpdateFolderRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1;
  string title = 2;
}

message UpdateFolderResponse {
  option (classtime.service.common.public_api) = true;
  FolderInfo folder_info = 1;
  repeated FolderInfo child_folders = 2;
  repeated QuestionSetInfo child_question_sets = 3;
}

message MoveFolderRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1;
  string target_parent_folder_id = 2;
}

message MoveFolderResponse {
  option (classtime.service.common.public_api) = true;
  FolderInfo folder_info = 1;
  repeated FolderInfo child_folders = 2;
  repeated QuestionSetInfo child_question_sets = 3;
}

message GetFolderRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1;
}

message GetFolderResponse {
  option (classtime.service.common.public_api) = true;
  FolderInfo folder_info = 1;
  repeated FolderInfo child_folders = 2;
  repeated QuestionSetInfo child_question_sets = 3;
}

message GetCurriculumFolderRequest {
  string synchronized_from_folder_id = 1;
  string question_bank_id = 2;
}

message GetCurriculumFolderResponse {
  FolderInfo folder_info = 1;
}

message DeleteCurriculumFolderRequest {
  string question_bank_id = 2;
}

message DeleteCurriculumFolderResponse {}

message SetFolderStatusRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1; // use for (de)archiving
  repeated string folder_ids = 2; // use for deleting
  EntityStatus status = 3;
}

message SetFolderStatusResponse {
  option (classtime.service.common.public_api) = true;
}

message GetQuestionSetRequest {
  option (classtime.service.common.public_api) = true;
  reserved 2;
  string question_set_id = 1;
}

message GetQuestionSetBySecretRequest {
  string question_set_secret_link = 1;
}

message GetQuestionSetResponse {
  option (classtime.service.common.public_api) = true;
  QuestionSetInfo question_set_info = 1;
}

message GetQuestionSetForPrintoutRequest {
  string question_set_id = 1;
}

message GetQuestionSetForPrintoutResponse {
  string title = 1;
  string secret_link = 2;
  repeated classtime.service.question.api.Question questions = 3;
}

message GetCurriculumQuestionSetRequest {
  string synchronized_from_question_set_id = 1;
  string question_bank_id = 2;
  bool has_full_question_info = 3; // Maps to isPrintout in Django.
}

message GetCurriculumQuestionSetResponse {
  QuestionSetInfo question_set_info = 1;
}

message CreateQuestionSetRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1;
  string title = 2;

  // The following field must only be set when called using a machine role:
  string target_teacher_email = 3;
}
message CreateQuestionSetResponse {
  option (classtime.service.common.public_api) = true;
  QuestionSetInfo question_set_info = 1;
}

message UpdateQuestionSetRequest {
  option (classtime.service.common.public_api) = true;
  string question_set_id = 1;
  string title = 2;
}

message UpdateQuestionSetResponse {
  option (classtime.service.common.public_api) = true;
  QuestionSetInfo question_set_info = 1;
}

message SetSoloSessionRefRequest {
  string secret_id = 1;
  oneof solo_session_ref {
    classtime.entity.EntityRef anonymous_solo_session_ref = 2;
    classtime.entity.EntityRef authorized_solo_session_ref = 3;
  }
}

message SetSoloSessionRefResponse {}

message MoveQuestionsRequest {
  option (classtime.service.common.public_api) = true;
  repeated string question_ids = 1;
  string target_question_set_id = 2;
}

message MoveQuestionsResponse {
  option (classtime.service.common.public_api) = true;
}

message MoveQuestionSetsRequest {
  option (classtime.service.common.public_api) = true;
  repeated string question_set_id = 1;
  string target_parent_folder_id = 2;
}

message MoveQuestionSetsResponse {
  option (classtime.service.common.public_api) = true;
  repeated string question_set_id = 1;
}

message SetQuestionSetsStatusRequest {
  option (classtime.service.common.public_api) = true;
  repeated string question_set_ids = 1;
  EntityStatus status = 2;
  // TODO(https://app.asana.com/1/29774015570538/project/1176787179185737/task/1215965454264578?focus=true)
  // This field will be removed after the migration off Django is complete.
  string parent_folder_id = 3 [deprecated = true];
}
message SetQuestionSetsStatusResponse {
  option (classtime.service.common.public_api) = true;
}

message SetQuestionsStatusRequest {
  option (classtime.service.common.public_api) = true;
  repeated string question_ids = 1;
  EntityStatus status = 2;
  // When unarchiving questions, you need to set the target QuestionSet
  string target_question_set_id = 3;
}

message SetQuestionsStatusResponse {
  option (classtime.service.common.public_api) = true;
}

message CopyQuestionSetRequest {
  option (classtime.service.common.public_api) = true;
  string question_set_id = 1;
  string target_parent_folder_id = 2;
}

message CopyQuestionSetResponse {
  option (classtime.service.common.public_api) = true;
}

message CopyFolderRequest {
  string folder_id = 1;
  string parent_folder_id = 2;
}

message CopyFolderResponse {}

message GetTrashBinItemsRequest {}

message GetTrashBinItemsResponse {
  repeated FolderInfo folders = 1;
  repeated QuestionSetInfo question_sets = 2;
  repeated QuestionInfo questions = 3;
}

message ExportQuestionSetRequest {
  string question_set_id = 1;
}

message ExportQuestionSetResponse {
  bytes pdf_file_content = 1;
}

message SubmitQuestionSetForReviewRequest {
  string question_set_id = 1;
  string author = 2;
  string extra = 3;
}

message SubmitQuestionSetForReviewResponse {
  QuestionSetPrivacy privacy = 1;
}

message CopyQuestionRequest {
  option (classtime.service.common.public_api) = true;
  string question_id = 1;
  string target_question_set_id = 2;
}

message CopyQuestionResponse {
  option (classtime.service.common.public_api) = true;
  QuestionInfo question = 1;
}

message ChangeFolderCollaboratorsRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1;
  string school_id = 2;
  // Note: classtime_ids
  repeated string added_account_ids = 3;
  repeated string removed_account_ids = 4;
  repeated string read_only_access_mode_ids = 5;
}

message ChangeFolderCollaboratorsResponse {
  option (classtime.service.common.public_api) = true;
  reserved 1;
  // Note: classtime_ids
  repeated string collaborator_ids = 2;
}

message GetFolderCollaboratorsRequest {
  option (classtime.service.common.public_api) = true;
  string folder_id = 1;
}

message GetFolderCollaboratorsResponse {
  option (classtime.service.common.public_api) = true;
  repeated classtime.service.common.CollaboratorInfo collaborator_infos = 1;
  classtime.service.common.SchoolInfo school = 2;
  string organization_id = 3;
}

message ReorderQuestionsRequest {
  option (classtime.service.common.public_api) = true;
  string question_set_id = 1;
  repeated string question_ids = 2;
}

message ReorderQuestionsResponse {
  option (classtime.service.common.public_api) = true;
}

message GetPlaylistDetailsRequest {
  repeated classtime.service.common.PlaylistEntry playlist = 1;
}

message GetPlaylistDetailsResponse {
  message PlaylistDetailsEntry {
    classtime.service.question.api.QuestionGroup question_group = 1;
    repeated classtime.service.question.api.Question questions = 2;
    string publisher_account_id = 3;
  }

  repeated PlaylistDetailsEntry playlist_details = 1;
}

message GetFolderQuestionSetsRequest {
  string folder_id = 1;
}

message GetFolderQuestionSetsResponse {
  repeated QuestionSetInfo question_sets = 1;
}

message LibraryChoice {
  bool is_correct = 1;
  int32 order = 2;
  google.protobuf.Struct content_draftjs = 3;
  string image = 4;
  string uuid = 5;
}

// Both Single and Multiple
message ChoiceLibraryQuestion {
  repeated LibraryChoice choices = 1;
}

message LibraryCategorizerCategory {
  google.protobuf.Struct content_draftjs = 1;
  string uuid = 2;
}

message LibraryCategorizerItem {
  google.protobuf.Struct content_draftjs = 1;
  string uuid = 2;
  repeated string category_uuids = 3;
}

// Both Categorizer and CategorizerMultiple
message CategorizerLibraryQuestion {
  repeated LibraryCategorizerItem items = 1;
  repeated LibraryCategorizerCategory categories = 2;
}

message BooleanLibraryQuestion {
  bool is_true_correct = 1;
}
message TextLibraryQuestion {}

message EssayLibraryQuestion {}

message SorterLibraryQuestion {
  repeated LibraryChoice choices = 1;
}

message LibraryClozeChoice {
  bool is_correct = 1;
  string content = 2;
}

message LibraryCloze {
  repeated LibraryClozeChoice cloze_choices = 1;
  /* referenced in [HighlightTextLibraryQuestion.template_content] */
  string template_id = 2;
}

message HighlightTextLibraryQuestion {
  /* contains plain context text with template ids reference to clozes (e.g. "[cloze_id_1] other plain text") */
  string template_content = 1;
  repeated LibraryCloze clozes = 2;
}

message HotspotLibraryQuestion {
  int32 width = 1;
  int32 height = 2;
  string image = 3;
  repeated classtime.service.question.api.Shape shapes = 4;
  bool require_all = 5;
}

message LibraryGapChoice {
  string content = 1;
  int32 index = 2;
  bool is_correct = 3;
  string parent_gap_template_id = 4;
}

message LibraryChoicesGap {
  repeated LibraryGapChoice choices = 1;
}

message LibraryBlankGap {
  string solution = 1;
}

message LibraryGap {
  /* referenced in [FillInTheGapLibraryQuestion.gap_template_content] */
  string gap_template_id = 1;
  oneof gap {
    LibraryBlankGap gap_blank = 2;
    LibraryChoicesGap gap_choices = 3;
  }
}

message FillInTheGapLibraryQuestion {
  /* contains plain context text with template ids reference to gaps (e.g. "[gap_id_1] other plain text") */
  string gap_template_content = 1;
  repeated LibraryGap gaps = 2;
}

message CreateLegacyQuestionRequest {
  string question_set_id = 1;
  string title = 2;
  float weight = 3;
  google.protobuf.Struct description_draftjs = 4;
  google.protobuf.Struct explanation_draftjs = 5;
  string image = 6;
  string audio = 7;
  string video = 8;
  repeated string tag_ids = 9;
  bool is_poll = 10;
  classtime.service.question.api.ContextMaterial context_material = 22;

  oneof question {
    ChoiceLibraryQuestion question_single_choice = 11;
    ChoiceLibraryQuestion question_multiple_choice = 12;
    BooleanLibraryQuestion question_boolean = 13;
    TextLibraryQuestion question_text = 14;
    EssayLibraryQuestion question_essay = 15;
    SorterLibraryQuestion question_sorter = 16;
    CategorizerLibraryQuestion question_categorizer = 17;
    CategorizerLibraryQuestion question_categorizer_multi = 18;
    HighlightTextLibraryQuestion question_highlight_text = 19;
    HotspotLibraryQuestion question_hotspot = 20;
    FillInTheGapLibraryQuestion question_gap = 21;
  }
}

message CreateLibraryQuestionRequest {
  string question_set_id = 1;
  classtime.service.question.api.Question question = 2;

  // The following fields must only be set when called with a machine role:
  string target_teacher_email = 3;
  bool can_solution_be_empty = 4;
}

message CreateQuestionResponse {
  string id = 1;
}

message GetQuestionRequest {
  string question_id = 1;
}

message GetQuestionResponse {
  classtime.service.question.api.Question question = 1;
  repeated QuestionLock locks = 2;
  google.protobuf.Timestamp modified_at = 3;
  repeated classtime.service.common.QuestionTag tags = 4;
}

message CreateQuestionLockRequest {
  string question_id = 1;
}

message CreateQuestionLockResponse {}

message UpdateQuestionLockRequest {
  string question_id = 1;
}

message UpdateQuestionLockResponse {}

message DeleteQuestionLockRequest {
  string question_id = 1;
}

message DeleteQuestionLockResponse {}

message GetQuestionSetShareTokenRequest {
  string question_set_id = 1;
}

message GetQuestionSetShareTokenResponse {
  string token = 1;
}

message ImportSharedQuestionSetRequest {
  string question_set_id = 1;
  string secret_link = 3;

  // TODO(https://app.asana.com/1/29774015570538/project/1176787179185737/task/1216244677554412): Remove legacy field.
  string token = 2;
}

message ImportSharedQuestionSetResponse {
  QuestionSetInfo question_set_info = 1;
}

message GetSharedQuestionSetRequest {
  string question_set_id = 1;
  string secret_link = 3;

  // TODO(https://app.asana.com/1/29774015570538/project/1176787179185737/task/1216244677554412): Remove legacy field.
  string token = 2; // Legacy field. Will be removed.
}

message SharedQuestionSetInfo {
  string id = 1;
  string title = 2;
  repeated classtime.service.question.api.Question questions = 3;
  string publisher_account_id = 4;
}

message GetSharedQuestionSetResponse {
  SharedQuestionSetInfo question_set_info = 1;
}

message GetProtectedQuestionsRequest {
  oneof identifier {
    string folder_id = 1;
    string question_set_id = 2;
  }
}

message GetProtectedQuestionsResponse {
  message ShortQuestionInfo {
    string id = 1;
    string title = 2;
    classtime.service.question.api.QuestionKind kind = 3;
  }

  repeated ShortQuestionInfo questions = 1;
}

message UpdateQuestionRequest {
  // This field will eventually be removed. Since Question has its own ID, we do not need to provide QS ID
  string question_set_id = 1;
  string question_id = 2;
  classtime.service.question.api.Question question = 3;
  google.protobuf.Timestamp modified_at = 4;
}

message UpdateQuestionResponse {
  classtime.service.question.api.Question question = 1;
  google.protobuf.Timestamp modified_at = 2;
}
